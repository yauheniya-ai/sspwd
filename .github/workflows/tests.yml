name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src --cov-report=term-missing

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(uv run pytest --cov=src --cov-report=term-missing 2>/dev/null \
            | grep "^TOTAL" | awk '{print $NF}' | sed 's/%//')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.4.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 54efe8e9445e06c13617aa69bae44b21
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          valColorRange: ${{ steps.coverage.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100
          colorRange: red, red, orange, yellow, brightgreen